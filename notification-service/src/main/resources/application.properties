quarkus.application.name=notification-service
quarkus.http.port=8089

quarkus.smallrye-openapi.info-title=Notification Service API
quarkus.swagger-ui.always-include=true

# Use a non-existent database to store notifications — reuse the auth_db or create a dedicated one
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=admin
quarkus.datasource.password=admin123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/user_db

quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

quarkus.oidc.auth-server-url=http://localhost:8080/realms/ecommerce
quarkus.oidc.client-id=ecommerce-backend
quarkus.oidc.credentials.secret=ecommerce-backend-secret
quarkus.oidc.application-type=service
quarkus.oidc.roles.role-claim-path=groups

kafka.bootstrap.servers=localhost:29092

# Incoming: payment-processed
mp.messaging.incoming.payment-processed-in.connector=smallrye-kafka
mp.messaging.incoming.payment-processed-in.topic=payment-processed
mp.messaging.incoming.payment-processed-in.group.id=notification-service
mp.messaging.incoming.payment-processed-in.value.type=com.ecommerce.common.event.PaymentProcessedEvent

# Incoming: order-confirmed
mp.messaging.incoming.order-confirmed-in.connector=smallrye-kafka
mp.messaging.incoming.order-confirmed-in.topic=order-confirmed
mp.messaging.incoming.order-confirmed-in.group.id=notification-service
mp.messaging.incoming.order-confirmed-in.value.type=com.ecommerce.common.event.OrderConfirmedEvent

quarkus.log.level=INFO
quarkus.log.category."com.ecommerce".level=DEBUG
quarkus.http.cors=true
quarkus.http.cors.origins=*


